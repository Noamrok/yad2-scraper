name: Yad2 Scraper

on:
  schedule:
    - cron: "*/20 * * * *"  # every 20 minutes
  workflow_dispatch:         # allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Restore seen tokens
        uses: actions/cache@v4
        with:
          path: seen_tokens.json
          key: seen-tokens-${{ github.run_id }}
          restore-keys: seen-tokens-

      - name: Run scraper
        env:
          GREENAPI_INSTANCE: ${{ secrets.GREENAPI_INSTANCE }}
          GREENAPI_TOKEN: ${{ secrets.GREENAPI_TOKEN }}
        run: python main.py --once

      - name: Save seen tokens
        uses: actions/cache/save@v4
        with:
          path: seen_tokens.json
          key: seen-tokens-${{ github.run_id }}
